name: CI/CD Production Pipeline
on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Run Smoke Tests
        run: |
          # Ensure the tests directory exists before running
          mkdir -p tests
          if [ -f tests/test_imports.py ]; then
            pytest tests/test_imports.py
          else
            echo "Skipping tests: test_imports.py not found."
          fi

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Professional Git config for CI
          git config --global user.email "johnboscokibet@gmail.com"
          git config --global user.name "Johnbosco Kibet (CI/CD)"
          
          # Force push to the Hugging Face Space using the token
          git push --force https://johnboscokibet:$HF_TOKEN@huggingface.co/spaces/johnboscokibet/infrastructure-mlops-pro main
